<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Navigation System</title>

<style>
    html, body {
        height: 100%;
        margin: 0;
        padding: 0;
    }

    body {
        background: #000;
        color: #0ff;
        font-family: 'Courier New', monospace;
        text-align: center;
        padding-top: 40px;
        overflow: hidden;
        transition: background-image 1.5s ease-in-out;
        background-size: cover;
        background-position: center;
    }

    #overlay {
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.55);
        pointer-events: none;
        z-index: 1;
    }

    h1 {
        color: #0ff;
        text-shadow: 0 0 15px #0ff;
        position: relative;
        z-index: 2;
    }

    .panel {
        margin-top: 20px;
        padding: 20px;
        border: 3px solid #0ff;
        border-radius: 10px;
        box-shadow: 0 0 25px #0ff;
        background: #111;
        display: inline-block;
        width: 420px;
        position: relative;
        z-index: 2;
    }

    select {
        width: 80%;
        padding: 10px;
        margin-top: 15px;
        background: #000;
        color: #0ff;
        border: 2px solid #0ff;
        border-radius: 8px;
        font-size: 16px;
        text-align: center;
    }

    .btn {
        margin-top: 20px;
        padding: 12px 25px;
        background: #022;
        border: 2px solid #0ff;
        color: #0ff;
        cursor: pointer;
        border-radius: 8px;
        transition: 0.2s;
        position: relative;
        z-index: 2;
    }

    .btn:hover {
        background: #044;
        box-shadow: 0 0 15px #0ff;
    }

    .progress-bg {
        width: 100%;
        height: 20px;
        background: #222;
        border: 2px solid #0ff;
        border-radius: 10px;
        margin-top: 20px;
        overflow: hidden;
    }

    .progress-fill {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #0ff, #ff0, #f00);
        box-shadow: 0 0 20px #0ff;
        transition: 0.2s;
    }

    /* FULLSCREEN warp tunnel */
    #warpTunnel {
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
        background: radial-gradient(circle, #fff 0%, #00f 20%, #000 70%);
        opacity: 0;
        pointer-events: none;
        z-index: 9999;
        transition: 0.5s;
        background-size: 200% 200%;
        animation: none;
    }

    @keyframes tunnelSpin {
        0% { background-position: 50% 50%; transform: scale(1); }
        50% { background-position: 100% 100%; transform: scale(3); }
        100% { background-position: 50% 50%; transform: scale(1); }
    }

    /* Screen shake */
    @keyframes shake {
        0% { transform: translate(0, 0); }
        25% { transform: translate(5px, -5px); }
        50% { transform: translate(-5px, 5px); }
        75% { transform: translate(5px, 5px); }
        100% { transform: translate(0, 0); }
    }

    /* FULLSCREEN arrival flash */
    #arrivalFlash {
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
        background: white;
        opacity: 0;
        pointer-events: none;
        z-index: 99999;
        transition: 0.3s;
    }

    #status {
        min-height: 40px;
        margin-top: 10px;
    }
    #hologram {
        position: fixed;
        top: 15%;
        left: 70%;
        transform: translateX(-50%);
        width: 260px;
        padding: 10px;
        background: rgba(0, 20, 60, 0.3);
        border: 2px solid #0ff;
        border-radius: 10px;
        color: #0ff;
        z-index: 3;
        text-align: center;
        backdrop-filter: blur(6px);
        box-shadow: 0 0 25px #0ff, inset 0 0 10px #0ff;
        animation: holoGlow 3s infinite alternate;
    }

    #holoImage {
        width: 100%;
        height: 140px;
        background-size: cover;
        background-position: center;
        border: 2px solid #0ff;
        border-radius: 6px;
        box-shadow: 0 0 20px #0ff;
        position: relative;
        overflow: hidden;
    }

    /* Animated shimmer lines */
    #holoImage::before {
        content: "";
        position: absolute;
        inset: 0;
        background: repeating-linear-gradient(
            to bottom,
            rgba(0,255,255,0.15) 0px,
            rgba(0,255,255,0.05) 2px,
            transparent 4px
        );
        animation: holoScan 2s linear infinite;
    }

    /* Subtle flicker glow */
    @keyframes holoGlow {
        0% { box-shadow: 0 0 15px #0ff, inset 0 0 5px #0ff; opacity: 0.9; }
        50% { box-shadow: 0 0 25px #0ff, inset 0 0 10px #0ff; opacity: 1; }
        100% { box-shadow: 0 0 15px #0ff, inset 0 0 5px #0ff; opacity: 0.9; }
    }

    /* Moving scan lines */
    @keyframes holoScan {
        0% { background-position: 0 0; }
        100% { background-position: 0 100%; }
    }


    /* MINI-MAP */
    #minimap {
        position: fixed;
        bottom: 20px;
        left: 20px;
        width: 180px;
        padding: 10px;
        background: rgba(0,0,0,0.6);
        border: 2px solid #0ff;
        border-radius: 10px;
        color: #0ff;
        z-index: 3;
        text-align: center;
        box-shadow: 0 0 20px #0ff;
    }

    #minimapPreview {
        width: 100%;
        height: 100px;
        background-size: cover;
        background-position: center;
        border: 2px solid #0ff;
        border-radius: 6px;
        margin-bottom: 8px;
    }

    @keyframes holoPulse {
    0% { opacity: 0.9; box-shadow: 0 0 10px #0ff; }
    50% { opacity: 1; box-shadow: 0 0 20px #0ff; }
    100% { opacity: 0.9; box-shadow: 0 0 10px #0ff; }
    }

    #holoImage {
        animation: holoPulse 2s infinite;
    }


    /* TRAVEL LOG */
    #travelLog {
        position: fixed;
        top: 120px;
        right: 20px;
        width: 220px;
        height: 300px;
        overflow-y: auto;
        background: rgba(0,0,0,0.6);
        border: 2px solid #0ff;
        border-radius: 10px;
        padding: 10px;
        color: #0ff;
        z-index: 3;
    }

    #travelLog ul {
        list-style: none;
        padding: 0;
        margin: 0;
    }

    #travelLog li {
        margin-bottom: 6px;
        border-bottom: 1px solid #0ff;
        padding-bottom: 4px;
    }
</style>

</head>
<body>

<div id="overlay"></div>

<h1>🧭 MULTIVERSE NAVIGATION SYSTEM</h1>

<div class="panel">
    <p>Select your destination:</p>

    <select id="destination">
        <optgroup label="Real Places">
            <option value="tokyo">Tokyo</option>
            <option value="nyc">New York City</option>
            <option value="paris">Paris</option>
            <option value="grandcanyon">Grand Canyon</option>
            <option value="iceland">Iceland</option>
            <option value="sahara">Sahara Desert</option>
        </optgroup>

        <optgroup label="Media‑Style Worlds">
            <option value="hill1985">Hill Valley – 1985</option>
            <option value="hill2015">Hill Valley – 2015</option>
            <option value="oldwest">Old West – 1885</option>
            <option value="cyberpunk">Cyberpunk City</option>
            <option value="fantasy">Fantasy Medieval Town</option>
            <option value="station">Orbital Space Station</option>
            <option value="zebes">Zebes</option>
        </optgroup>

        <optgroup label="Sanderson Worlds">
            <option value="roshar">Roshar</option>
            <option value="scadrial">Scadrial</option>
            <option value="nalthis">Nalthis</option>
            <option value="taldain">Taldain</option>
            <option value="firstsun">First of the Sun</option>
        </optgroup>

        <optgroup label="Skyward / PHM">
            <option value="detritus">Detritus (Skyward)</option>
            <option value="phm">Adrian System Planet (Project Hail Mary)</option>
        </optgroup>
    </select>

    <button class="btn" onclick="engage()">Engage Navigation</button>

    <div class="progress-bg">
        <div id="progressFill" class="progress-fill"></div>
    </div>

    <p id="status"></p>
</div>

<button class="btn" onclick="window.location='controlpanel.html'">Return to Control Panel</button>

<!-- HOLOGRAM -->
<div id="hologram">
    <h3>Hologram Preview</h3>
    <div id="holoImage"></div>
</div>

<!-- MINI-MAP -->
<div id="minimap">
    <h3>Mini‑Map</h3>
    <div id="minimapPreview"></div>
    <p id="minimapLabel">Current Location: None</p>
</div>

<!-- TRAVEL LOG -->
<div id="travelLog">
    <h3>Travel Log</h3>
    <ul id="logList"></ul>
</div>

<div id="warpTunnel"></div>
<div id="arrivalFlash"></div>

<script>
/* All images replaced with stable URLs + your custom Detritus + your PHM image */
const backgrounds = {
    tokyo: "url('https://cdn.kimkim.com/files/a/images/6077051d16379eab327d03204d2c5d91cda44b25/original-c0d3cfb1770d1639002f327240fc2338.jpg')",
    nyc: "url('https://images.unsplash.com/photo-1469474968028-56623f02e42e?auto=format&fit=crop&w=1600&q=80')",
    paris: "url('https://images.unsplash.com/photo-1502602898657-3e91760cbb34?auto=format&fit=crop&w=1600&q=80')",
    grandcanyon: "url('https://greensmarteco.com/wp-content/uploads/2020/07/grand-canyon-national-park-horseshoe-bend-travel-usa.jpg')",
    iceland: "url('https://images.unsplash.com/photo-1500534314211-0a24cd03f2c0?auto=format&fit=crop&w=1600&q=80')",
    sahara: "url('https://images.unsplash.com/photo-1508261306211-0e3b5c008651?auto=format&fit=crop&w=1600&q=80')",

    hill1985: "url('https://images.unsplash.com/photo-1500534314211-0a24cd03f2c0?auto=format&fit=crop&w=1600&q=80')",
    hill2015: "url('https://images.unsplash.com/photo-1504384308090-c894fdcc538d?auto=format&fit=crop&w=1600&q=80')",
    oldwest: "url('https://images.unsplash.com/photo-1501785888041-af3ef285b470?auto=format&fit=crop&w=1600&q=80')",
    cyberpunk: "url('https://images.unsplash.com/photo-1496307042754-b4aa456c4a2d?auto=format&fit=crop&w=1600&q=80')",
    fantasy: "url('https://images.unsplash.com/photo-1526481280695-3c687fd543c0?auto=format&fit=crop&w=1600&q=80')",
    station: "url('https://images.unsplash.com/photo-1581090700227-1e37b190418e?auto=format&fit=crop&w=1600&q=80')",
    zebes: "url('https://i.redd.it/pm466mis31ec1.jpeg')",

    roshar: "url('https://images.unsplash.com/photo-1500534314211-0a24cd03f2c0?auto=format&fit=crop&w=1600&q=80')",
    scadrial: "url('https://images.unsplash.com/photo-1482192596544-9eb780fc7f66?auto=format&fit=crop&w=1600&q=80')",
    nalthis: "url('https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?auto=format&fit=crop&w=1600&q=80')",
    taldain: "url('https://images.unsplash.com/photo-1508261306211-0e3b5c008651?auto=format&fit=crop&w=1600&q=80')",
    firstsun: "url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e?auto=format&fit=crop&w=1600&q=80')",

    detritus: "url('images/detritus.png')",
    phm: "url('https://www.shockmansion.com/wp-content/myimages/2025/11/projecthailmary-still.jpg')"
};

/* HOLOGRAM PREVIEW */
document.getElementById("destination").addEventListener("change", function() {
    let key = this.value;
    document.getElementById("holoImage").style.backgroundImage = backgrounds[key];
});

function engage() {
    let destKey = document.getElementById("destination").value;
    let status = document.getElementById("status");
    let bar = document.getElementById("progressFill");
    let tunnel = document.getElementById("warpTunnel");
    let flash = document.getElementById("arrivalFlash");

    status.innerText = "Navigation engaged… plotting route…";
    bar.style.width = "0%";

    let progress = 0;
    let interval = setInterval(() => {
        progress += 5;
        bar.style.width = progress + "%";

        if (progress === 25) status.innerText = "Stabilizing vectors…";
        if (progress === 50) status.innerText = "Aligning flux pathways…";
        if (progress === 75) status.innerText = "Charging warp tunnel…";

        if (progress >= 100) {
            clearInterval(interval);
            status.innerText = "Initiating jump…";

            tunnel.style.opacity = 1;
            tunnel.style.animation = "tunnelSpin 2s ease-out";
            document.body.style.animation = "shake 0.2s infinite";

            setTimeout(() => {
                flash.style.opacity = 1;
            }, 1800);

            setTimeout(() => {
                flash.style.opacity = 0;
                tunnel.style.opacity = 0;
                document.body.style.animation = "none";

                if (backgrounds[destKey]) {
                    document.body.style.backgroundImage = backgrounds[destKey];
                }

                const label = document.querySelector(`#destination option[value="${destKey}"]`).textContent;
                status.innerText = "Arrived at " + label + ".";

                /* MINI-MAP UPDATE */
                document.getElementById("minimapPreview").style.backgroundImage = backgrounds[destKey];
                document.getElementById("minimapLabel").innerText = "Current Location: " + label;

                /* TRAVEL LOG UPDATE */
                let log = document.getElementById("logList");
                let entry = document.createElement("li");
                entry.innerText = "Arrived at " + label + " — " + new Date().toLocaleTimeString();
                log.appendChild(entry);

            }, 2300);
        }
    }, 120);
}
</script>

</body>
</html>
