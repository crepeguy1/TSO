<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DeLorean Dashboard</title>

<style>
    body {
        background: #000;
        color: #0ff;
        font-family: 'Courier New', monospace;
        text-align: center;
        padding: 30px;
    }

    h1 {
        color: #ff3300;
        text-shadow: 0 0 15px #ff3300;
        margin-bottom: 20px;
    }

    .panel {
        display: grid;
        grid-template-columns: repeat(2, 260px);
        gap: 25px;
        justify-content: center;
        margin-top: 20px;
    }

    .box {
        background: #111;
        border: 3px solid #0ff;
        border-radius: 10px;
        padding: 20px;
        box-shadow: 0 0 20px #0ff;
    }

    .label {
        color: #ff3300;
        font-size: 18px;
        text-shadow: 0 0 10px #ff3300;
        margin-bottom: 10px;
    }

    /* SPEEDOMETER */
    .speedometer {
        width: 200px;
        height: 200px;
        border: 4px solid #0ff;
        border-radius: 50%;
        margin: 0 auto;
        position: relative;
        box-shadow: 0 0 20px #0ff;
    }

    .needle {
        width: 4px;
        height: 80px;
        background: #f00;
        position: absolute;
        left: 50%;
        bottom: 50%;
        transform-origin: bottom;
        transform: translateX(-50%) rotate(-90deg);
        box-shadow: 0 0 10px #f00;
    }

    /* Meters */
    .meter-bg {
        width: 100%;
        height: 20px;
        background: #222;
        border-radius: 8px;
        overflow: hidden;
        border: 2px solid #0ff;
        margin-top: 10px;
    }

    .meter-fill {
        height: 100%;
        width: 10%;
        background: linear-gradient(90deg, #0ff, #ff0, #f00);
        box-shadow: 0 0 15px #0ff;
        transition: 0.2s;
    }

    /* Time Circuits */
    .time-display {
        background: #001100;
        border: 2px solid #0f0;
        padding: 10px;
        margin: 5px 0;
        border-radius: 6px;
        text-shadow: 0 0 10px #0f0;
    }

    .btn {
        margin-top: 25px;
        padding: 12px 25px;
        background: #022;
        border: 2px solid #0ff;
        color: #0ff;
        cursor: pointer;
        border-radius: 8px;
        transition: 0.2s;
    }

    .btn:hover {
        background: #044;
        box-shadow: 0 0 15px #0ff;
    }
</style>

</head>
<body>

<h1>🚗 DELOREAN TIME-MACHINE DASHBOARD</h1>

<div class="panel">

    <!-- SPEEDOMETER -->
    <div class="box">
        <div class="label">SPEED</div>
        <div class="speedometer">
            <div id="needle" class="needle"></div>
        </div>
        <button class="btn" onclick="accelerate()">Accelerate</button>
        <button class="btn" onclick="decelerate()">Decelerate</button>
    </div>

    <!-- FLUX CHARGE -->
    <div class="box">
        <div class="label">FLUX CHARGE</div>
        <div class="meter-bg">
            <div id="fluxFill" class="meter-fill"></div>
        </div>
        <button class="btn" onclick="fluxUp()">Increase</button>
        <button class="btn" onclick="fluxDown()">Decrease</button>
    </div>

    <!-- MR FUSION -->
    <div class="box">
        <div class="label">MR. FUSION LEVEL</div>
        <div class="meter-bg">
            <div id="fusionFill" class="meter-fill"></div>
        </div>
        <button class="btn" onclick="fusionUp()">Increase</button>
        <button class="btn" onclick="fusionDown()">Decrease</button>
    </div>

    <!-- TEMPORAL STABILITY -->
    <div class="box">
        <div class="label">TEMPORAL STABILITY</div>
        <div class="meter-bg">
            <div id="tempFill" class="meter-fill"></div>
        </div>
        <button class="btn" onclick="tempUp()">Increase</button>
        <button class="btn" onclick="tempDown()">Decrease</button>
    </div>

    <!-- TIME CIRCUITS -->
    <div class="box" style="grid-column: span 2;">
        <div class="label">TIME CIRCUITS</div>

        <div class="time-display" id="dest">DESTINATION: OCT 26 1985 01:21</div>
        <div class="time-display" id="present">PRESENT: JAN 01 2025 12:00</div>
        <div class="time-display" id="last">LAST DEPARTED: --- -- ---- --:--</div>

        <button class="btn" onclick="jump()">Engage Time Jump</button>
    </div>

</div>

<button class="btn" onclick="window.location='../controlpanel.html'">Return to Control Panel</button>

<script>
let speed = 0;
let flux = 10;
let fusion = 10;
let temp = 10;

function updateNeedle() {
    document.getElementById("needle").style.transform =
        `translateX(-50%) rotate(${speed - 90}deg)`;
}

let targetSpeed = 0;

function updateNeedle() {
    // Smooth animation toward target speed
    speed += (targetSpeed - speed) * 0.1;

    document.getElementById("needle").style.transform =
        `translateX(-50%) rotate(${speed - 90}deg)`;

    requestAnimationFrame(updateNeedle);
}

updateNeedle(); // start animation loop

function accelerate() {
    if (targetSpeed < 160) targetSpeed += 10;
}

function decelerate() {
    if (targetSpeed > 0) targetSpeed -= 10;
}

function fluxUp() {
    if (flux < 100) flux += 5;
    document.getElementById("fluxFill").style.width = flux + "%";
}

function fluxDown() {
    if (flux > 0) flux -= 5;
    document.getElementById("fluxFill").style.width = flux + "%";
}

function fusionUp() {
    if (fusion < 100) fusion += 5;
    document.getElementById("fusionFill").style.width = fusion + "%";
}

function fusionDown() {
    if (fusion > 0) fusion -= 5;
    document.getElementById("fusionFill").style.width = fusion + "%";
}

function tempUp() {
    if (temp < 100) temp += 5;
    document.getElementById("tempFill").style.width = temp + "%";
}

function tempDown() {
    if (temp > 0) temp -= 5;
    document.getElementById("tempFill").style.width = temp + "%";
}

function jump() {
    document.getElementById("last").innerText =
        "LAST DEPARTED: " + document.getElementById("present").innerText.replace("PRESENT: ", "");
    document.getElementById("present").innerText =
        "PRESENT: " + new Date().toLocaleString();
}

localStorage.setItem("task_deloreanui", "done");
</script>

</body>
</html>
