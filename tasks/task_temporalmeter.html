<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Temporal Meter Task</title>

<style>
    body {
        background: #000;
        color: #0ff;
        font-family: 'Courier New', monospace;
        text-align: center;
        padding: 40px;
    }

    h1 {
        color: #0f0;
        text-shadow: 0 0 15px #0f0;
    }

    .panel {
        margin-top: 30px;
        padding: 20px;
        border: 3px solid #0f0;
        border-radius: 10px;
        box-shadow: 0 0 25px #0f0;
        background: #111;
        display: inline-block;
        width: 420px;
    }

    .meter-bg {
        width: 100%;
        height: 30px;
        background: #222;
        border-radius: 8px;
        overflow: hidden;
        margin: 20px 0;
        border: 2px solid #0f0;
    }

    .meter-fill {
        height: 100%;
        width: 10%;
        background: linear-gradient(90deg, #0f0, #ff0, #f00);
        box-shadow: 0 0 15px #0f0;
        transition: 0.2s;
    }

    .btn {
        margin-top: 15px;
        padding: 12px 25px;
        background: #020;
        border: 2px solid #0f0;
        color: #0f0;
        cursor: pointer;
        border-radius: 8px;
        transition: 0.2s;
    }

    .btn:hover {
        background: #040;
        box-shadow: 0 0 15px #0f0;
    }

    .success {
        color: #0f0;
        font-weight: bold;
        margin-top: 20px;
        text-shadow: 0 0 10px #0f0;
        font-size: 20px;
    }
</style>

</head>
<body>

<h1>🌀 TEMPORAL STABILITY METER</h1>

<div class="panel">
    <p><strong>Mission:</strong> Stabilize the temporal field by matching the target level.</p>

    <p><strong>Target Level:</strong> 70%</p>

    <div class="meter-bg">
        <div id="fill" class="meter-fill"></div>
    </div>

    <button class="btn" onclick="increase()">Increase Level</button>
    <button class="btn" onclick="decrease()">Decrease Level</button>

    <p id="result"></p>
</div>

<button class="btn" onclick="window.location='../controlpanel.html'">Return to Control Panel</button>

<script>
let level = 10;

function update() {
    document.getElementById("fill").style.width = level + "%";

    if (level === 70) {
        document.getElementById("result").innerHTML =
            "<span class='success'>Temporal Stability Achieved!</span>";
    } else {
        document.getElementById("result").innerText =
            "Adjusting temporal field...";
    }
}

function increase() {
    if (level < 100) level += 5;
    update();
}

function decrease() {
    if (level > 0) level -= 5;
    update();
}

localStorage.setItem("task_temporal", "done");
</script>

</body>
</html>
