<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quantum Drive Task</title>

<style>
    body {
        background: #000;
        color: #0ff;
        font-family: Arial, sans-serif;
        text-align: center;
        padding: 40px;
    }

    h1 {
        text-shadow: 0 0 15px #a0f;
        color: #c77bff;
    }

    .panel {
        margin-top: 30px;
        padding: 20px;
        border: 2px solid #a0f;
        border-radius: 10px;
        box-shadow: 0 0 25px #a0f;
        background: #120012;
        display: inline-block;
        width: 420px;
    }

    .freq {
        font-size: 32px;
        margin: 20px 0;
        text-shadow: 0 0 10px #a0f;
        letter-spacing: 4px;
    }

    .btn {
        margin-top: 15px;
        padding: 12px 25px;
        background: #220022;
        border: 2px solid #a0f;
        color: #d28cff;
        cursor: pointer;
        border-radius: 8px;
        transition: 0.2s;
    }

    .btn:hover {
        background: #440044;
        box-shadow: 0 0 15px #a0f;
    }

    .success {
        color: #0f0;
        font-weight: bold;
        margin-top: 20px;
        text-shadow: 0 0 10px #0f0;
        font-size: 20px;
    }
</style>

</head>
<body>

<h1>🌀 QUANTUM DRIVE TASK</h1>

<div class="panel">
    <p><strong>Mission:</strong> The quantum drive is out of resonance.</p>
    <p>Cycle through the quantum frequencies until they match the target.</p>

    <p><strong>Target Frequency:</strong></p>
    <div class="freq">✦ ✧ ✦ ✧ ✦</div>

    <p><strong>Your Frequency:</strong></p>
    <div id="freq" class="freq">✦ ✦ ✦ ✦ ✦</div>

    <button class="btn" onclick="shift()">Shift Frequency</button>

    <p id="result"></p>
</div>

<button class="btn" onclick="window.location='../controlpanel.html'">Return to Control Panel</button>

<script>
let patterns = [
    "✦ ✦ ✦ ✦ ✦",
    "✦ ✧ ✦ ✦ ✧",
    "✦ ✧ ✦ ✧ ✦", // correct
    "✧ ✦ ✧ ✦ ✧"
];

let index = 0;

function shift() {
    index++;
    if (index >= patterns.length) index = 0;

    document.getElementById("freq").innerText = patterns[index];

    if (patterns[index] === "✦ ✧ ✦ ✧ ✦") {
        document.getElementById("result").innerHTML =
            "<span class='success'>Quantum resonance achieved! Drive is stable.</span>";
    } else {
        document.getElementById("result").innerText = "Recalibrating quantum field...";
    }
}

localStorage.setItem("task_quantum", "done");
</script>

</body>
</html>
